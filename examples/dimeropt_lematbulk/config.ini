[Main]
executorlib = True
method = Dimer
dir_path = /work/07700/sjung3/vista/genTS/datasets/lemat-bulk/for_vista_jobs/CHE21006_sung
jobs_per_gpu = 6
Calculator = FAIRChemCalculator
fmax = 0.05
steps = 500
max_consecutive_errors = 5
restart_limit = 3

[FAIRChemCalculator]
device = cuda
name_or_path = uma-s-1p1
task_name = omat

######################## Dimer related ########################
[ourDimer]
dataset_type = bulk
reaction_types = vacancy hop_reuse hop_insert kickout_reuse kickout_insert ring
num_attempts_per_type = 1
ring_sizes = 2 3 4
delocalization_threshold = 0.6
extension_check_fmax = 0.4
extension_check_curvature = -0.2

[DimerControl]
max_num_rot = 10
initial_eigenmode_method = displacement
maximum_translation = 0.1
dimer_separation = 0.01
extrapolate_forces = True
displacement_method = gauss
gauss_std = 0.1
displacement_radius = 3.3
