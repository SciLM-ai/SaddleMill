[Main]
executorlib = True
method = Minimization  # options are "NEB", "Dimer", "Minimization" and "DoubleMinimization"
dir_path = data  # reads all *.traj files recursively in this directory recursively
Optimizer = FIRE
jobs_per_gpu = 4
Calculator = FAIRChemCalculator
fmax = 0.02
steps = 1000
input_statuses = converged converged_after_extension converged_CI converged_after_extension

[FAIRChemCalculator]
device = cuda
name_or_path = uma-s-1p2
task_name = oc22

[MDMin]
dt = 0.005
maxstep = 0.1

[FIRE]
dt = 0.05
maxstep = 0.1
dtmax = 0.2
downhill_check = False

[LBFGS]
memory = 10
damping = 0.99
alpha = 200
maxstep = 0.1
use_line_search = True
