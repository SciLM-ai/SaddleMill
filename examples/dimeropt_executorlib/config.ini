[Main]
executorlib = False
method = Dimer
dir_path=.  # reads all *.traj files in this directory
Optimizer = MDMin
jobs_per_gpu = 4
Calculator = FAIRChemCalculator  # In the future this could also be Vasp and VaspInteractive
fmax = 0.05
steps = 300

[FAIRChemCalculator]
device = cuda
model_name_or_path = uma-s-1p1
task_name = oc20

[MDMin]
dt = 0.02
maxstep = 0.1


######################## Dimer related ########################
[ourDimer]
num_attempts = 2
delocalization_threshold = 0.8

[DimerControl]
max_num_rot = 10
initial_eigenmode_method = displacement
maximum_translation = 0.2
dimer_separation = 0.01
extrapolate_forces = True
displacement_method = gauss
gauss_std = 0.1
displacement_radius = 3.3
