[Main]
executorlib = True
method = DoubleMinimization  # options are "NEB", "Dimer", "Minimization" and "DoubleMinimization"
dir_path = ../Dimer_OC22/Dimer_trajes  # reads all *.traj files recursively in this directory recursively
Optimizer = FIRE
jobs_per_gpu = 4
Calculator = FAIRChemCalculator
fmax = 0.02
steps = 1000
#run_jobs = not_converged
input_statuses = converged converged_after_extension converged_CI converged_after_extension

[ourDoubleMinimization]
pre_dimer_refine = True

# Rotation parameters for eigenmode refinement.
# max_num_rot controls how many rotation iterations per refinement.
# dimer_separation is the finite-difference step for curvature estimation.
[DimerControl]
max_num_rot = 50
dimer_separation = 0.01
f_rot_min = 0.01
f_rot_max = 0.05

[FAIRChemCalculator]
device = cuda
name_or_path = uma-s-1p2
task_name = oc22

[MDMin]
dt = 0.005
maxstep = 0.1

[FIRE]
dt = 0.05
maxstep = 0.1
dtmax = 0.2
downhill_check = False
