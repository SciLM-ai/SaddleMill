[Main]
executorlib = True
method = Dimer
dir_path = data
Optimizer = MDMin
device = 'cpu'
Calculator = Vasp
fmax = 0.5
steps = 2
zip = True
max_consecutive_errors = 0

[Vasp]
setups = minimal
ispin = 1
isym = 0
isif = 0
lreal = Auto
ediff = 0.01
nelm = 8
encut = 200.0
ismear = 0
sigma = 0.1
gga = PE
xc = PBE
pp = PBE
lwave = False
lcharg = False

[MDMin]
dt = 0.05
maxstep = 0.1

[DimerControl]
max_num_rot = 1
dimer_separation = 0.01

[ourDimer]
dataset_type = bulk
reaction_types = initial_guess
num_attempts_per_type = 1
supercell = False
vasp_command = "unset PMI2_FD PMI_FD PMI2_RANK PMI_RANK PMI2_SIZE PMI_SIZE PMI2_SPROUTE; I_MPI_HYDRA_BOOTSTRAP=fork mpirun -n 64 $HOME/vasp/vasp.6.4.0.1/bin/vasp_std"
vasp_ncore = 4
