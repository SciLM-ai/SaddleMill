[Main]
executorlib = False
method = Minimization  # options are "NEB", "Dimer", "Minimization" and "DoubleMinimization"
dir_path=.  # reads all *.traj files in this directory
Optimizer = MDMin
jobs_per_gpu = 4
Calculator = FAIRChemCalculator
fmax = 0.05
steps = 100

[FAIRChemCalculator]
device = cuda
name_or_path = uma-s-1p1
task_name = oc20

[MDMin]
dt = 0.02
maxstep = 0.1


######################## NEB related ########################
[ourNEB]
relax_endpoints = True
endpoint_relax_fmax = 0.01
endpoint_relax_maxsteps = 500
interpolate_method = "ocp_idpp"
num_frames = 10
batch_size = 8

[DyNEB]
k = 5
climb = True
method = improvedtangent
allow_shared_calculator = True
dynamic_relaxation = False


######################## Dimer related ########################
[ourDimer]
num_attempts = 2
delocalization_threshold = 0.8

[DimerControl]
max_num_rot = 10
initial_eigenmode_method = displacement
maximum_translation = 0.2
dimer_separation = 0.01
extrapolate_forces = True
displacement_method = gauss
gauss_std = 0.1
displacement_radius = 3.3


###################### Minimization related ######################
[ourMinimization]


################### Double Minimization related ###################
[ourDoubleMinimization]
