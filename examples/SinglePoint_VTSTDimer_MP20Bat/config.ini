# VTST dimer saddle search run as a SinglePoint job.
#
# SaddleMill is just the high-throughput launcher here: method = SinglePoint makes
# ASE take *no* optimization steps, so the single VASP call per frame runs the whole
# VTST dimer internally and the converged saddle is read back. Each input .traj frame
# must carry atoms.info['eigenmode'] (e.g. NEB climbing-image / Dimer / DoubleMinimization
# output frames) — that mode is written to MODECAR so the dimer starts from your guess
# with no random direction. Bulk MP battery materials -> OMat24 INCAR recipe.
#
# Requires a VTST-patched vasp_std at runtime. Use plain Vasp (NOT VaspInteractive,
# which forces ibrion=-1 and cannot drive an internal dimer).

[Main]
executorlib = True
method = SinglePoint
dir_path = data            # *.traj files whose frames have .info['eigenmode']
Optimizer = MDMin          # unused by SinglePoint (ASE takes no steps), but must be valid
device = 'cpu'
Calculator = Vasp
fmax = 0.05                # unused by SinglePoint; dimer convergence is ediffg below
steps = 1                  # unused by SinglePoint
zip = True
max_consecutive_errors = 0
# 2 dimers per node: each worker runs one SinglePoint (= one VASP VTST dimer) at a time.
# Size mpirun -n below so 4 x ranks fill the node (e.g. 4 x 32 = 128).
jobs_per_node = 4

[Vasp]
# Pure ASE pass-through. input_generator (below) supplies the OMat24 electronic/accuracy
# INCAR + k-mesh + POTCAR setups; here we ADD the VTST dimer driver tags (and could
# override any omat tag — [Vasp] always wins). ASE writes even the non-standard VTST
# tags (ichain/iopt/ddr/...) via its type-based fallback.
# --- VTST dimer driver ---
ichain = 2                 # select the dimer method
ibrion = 3                 # external optimizer drives the ionic steps
potim = 0                  # no VASP-internal ionic step
iopt = 3                   # QuickMin: force-driven translation (no fixed jump), capped by maxmove
maxmove = 0.1              # cap on the dimer-center translation step (A)
ddr = 0.005                # dimer image separation (A) for the curvature finite-difference
drotmax = 10               # max dimer rotations per translation
dfnmin = 0.01              # stop rotating once the rotational force is below this
nsw = 1000               # max dimer (ionic) steps
ediff = 1e-7              # tight SCF for clean dimer forces
ediffg = -0.05             # saddle force-convergence (eV/A)
lcharg = False             # don't write CHGCAR
lwave = False              # don't write WAVECAR
pp = PBE                   # POTCAR family (cheap_omat doesn't set this; ASE defaults to LDA)
pp_version = 54            # use $VASP_PP_PATH/potpaw_PBE.54 (VASP 5.4 POTCAR set)
ncore = 8
# --- cheap first-pass electronic settings (override the cheap_omat generator) ---
encut = 300                # Cu(plain) ENMAX 295.4 is the floor; reconverge higher
prec = Normal
ismear = 1                 # MP smearing for metals (generator default is -5)
sigma = 0.1
algo = Fast
timestep = 0.1             # VTST QuickMin step (POTIM stays 0)

[ourVasp]
input_generator   = cheap_omat      # cheap first-pass OMat24 recipe (rd=16, light POTCARs); needs fairchem-data-omat
extra_input_files = modecar         # write MODECAR from each frame's .info['eigenmode']
extra_outputs     = vtst_dimer      # read NEWMODECAR/DIMCAR -> eigenmode/curvature onto the output frame

[ourSinglePoint]
